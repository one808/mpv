name: Build mpv Windows

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
            rust_target: i686-pc-windows-gnu
            wine: wine32
          - arch: x86_64
            target: x86_64-w64-mingw32
            rust_target: x86_64-pc-windows-gnu
            wine: wine64

    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      TARGET: ${{ matrix.target }}
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: |
            ccache-${{ matrix.arch }}-

      - name: Restore dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/mingw_prefix
          key: deps-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: |
            deps-${{ matrix.arch }}-

      - name: Install dependencies
        run: |
          rustup target add ${{ matrix.rust_target }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf ${{ matrix.wine }} wine
          python3 -m pip install meson

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      - name: Build
        run: |
          ./ci/build-mingw64.sh
          ./ci/build-mingw64.sh meson pack

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}

      - name: Save dependencies cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ github.workspace }}/mingw_prefix
          key: deps-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}

      - name: Collect artifacts
        run: |
          mkdir -p release/${{ matrix.arch }}
          cp -v artifact/mpv.exe release/${{ matrix.arch }}/ 2>/dev/null || true
          cp -v artifact/mpv.com release/${{ matrix.arch }}/ 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-windows-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
