name: Build mpv Windows

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      DOWNLOAD_CACHE: ${{ github.workspace }}/.ccache/downloads
      TARGET: x86_64-w64-mingw32
      RUST_TARGET: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Get time
        id: get_time
        run: echo "timestamp=$(date +%s%N)" >> $GITHUB_OUTPUT

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.TARGET }}-${{ steps.get_time.outputs.timestamp }}
          restore-keys: ${{ env.TARGET }}-

      - name: Install dependencies
        run: |
          rustup target add ${{ env.RUST_TARGET }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y ccache g++-mingw-w64 gcc-multilib python3-pip nasm ninja-build pkgconf wine64 wine
          python3 -m pip install meson

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      - name: Build libraries
        run: |
          ./ci/build-mingw64.sh

      - name: Build with meson
        run: |
          ./ci/build-mingw64.sh meson pack

      - name: Print meson log
        if: failure()
        run: cat ./mingw_build/meson-logs/meson-log.txt

      - name: Functional test
        run: cd artifact && wine ./mpv.com -v --no-config
        env:
          WINEDEBUG: '+loaddll'

      - name: Run meson tests
        run: meson test -C mingw_build

      - name: Artifact name
        id: artifact
        run: |
          VERSION_FILE=$(find . -path "*/common/version.h" -type f | head -n 1)
          VER=$(grep VERSION "$VERSION_FILE" | cut -d'"' -f2)
          echo "name=mpv-${VER}-windows-x86_64-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: artifact/*

      - name: Save Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.TARGET }}-${{ steps.get_time.outputs.timestamp }}
