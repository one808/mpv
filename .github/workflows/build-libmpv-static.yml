name: Build static libmpv.dll

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32

    env:
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf cmake git \
            wine32 wine
          python3 -m pip install meson glad2

      - name: Update Meson WrapDB
        run: |
          meson wrap update-db
          meson wrap install expat
          meson wrap install harfbuzz
          meson wrap install libpng
          meson wrap install zlib

      - name: Create subproject wraps (from build-win32.ps1)
        run: |
          mkdir -p subprojects

          # ffmpeg wrap
          cat > subprojects/ffmpeg.wrap <<'EOF'
          [wrap-git]
          url = https://gitlab.freedesktop.org/gstreamer/meson-ports/ffmpeg.git
          revision = meson-8.1
          depth = 1
          clone-recursive = true

          [provide]
          dependency_names = libavcodec, libavdevice, libavfilter, libavformat, libavutil, libswresample, libswscale
          program_names = ffmpeg
          EOF

          # libass wrap
          cat > subprojects/libass.wrap <<'EOF'
          [wrap-git]
          url = https://github.com/libass/libass
          revision = master
          depth = 1
          EOF

          # libplacebo wrap
          cat > subprojects/libplacebo.wrap <<'EOF'
          [wrap-git]
          url = https://code.videolan.org/videolan/libplacebo.git
          revision = master
          depth = 1
          EOF

          # dav1d wrap
          cat > subprojects/dav1d.wrap <<'EOF'
          [wrap-git]
          url = https://code.videolan.org/videolan/dav1d
          revision = master
          depth = 1

          [provide]
          dav1d = dav1d_dep
          EOF

          # spirv-cross wrap (cmake method)
          cat > subprojects/spirv-cross-c-shared.wrap <<'EOF'
          [wrap-git]
          url = https://github.com/KhronosGroup/SPIRV-Cross
          revision = main
          depth = 1
          method = cmake
          EOF

          # vulkan-loader wrap (cmake method)
          cat > subprojects/vulkan-loader.wrap <<'EOF'
          [wrap-git]
          url = https://github.com/KhronosGroup/Vulkan-Loader
          revision = main
          depth = 1
          method = cmake
          EOF

          # shaderc: custom meson.build wrapping cmake subproject
          if [ ! -d subprojects/shaderc_cmake ]; then
            git clone --depth=1 https://github.com/google/shaderc subprojects/shaderc_cmake
            cd subprojects/shaderc_cmake
            ./utils/git-sync-deps
            cd ../..
          fi
          mkdir -p subprojects/shaderc
          cat > subprojects/shaderc/meson.build <<'MESONEOF'
          project('shaderc', 'cpp', version: '2024.1')
          cmake = import('cmake')
          opts = cmake.subproject_options()
          opts.add_cmake_defines({
              'SHADERC_SKIP_INSTALL': 'ON',
              'SHADERC_SKIP_TESTS': 'ON',
              'SHADERC_SKIP_EXAMPLES': 'ON',
              'SHADERC_SKIP_COPYRIGHT_CHECK': 'ON'
          })
          shaderc_proj = cmake.subproject('shaderc_cmake', options: opts)
          shaderc_dep = declare_dependency(dependencies: [
              shaderc_proj.dependency('shaderc'),
              shaderc_proj.dependency('shaderc_util'),
              shaderc_proj.dependency('SPIRV-Tools-static'),
              shaderc_proj.dependency('SPIRV-Tools-opt'),
              shaderc_proj.dependency('glslang'),
          ])
          meson.override_dependency('shaderc', shaderc_dep)
          MESONEOF

          # spirv-cross: custom meson.build
          mkdir -p subprojects/spirv-cross-c-shared
          cat > subprojects/spirv-cross-c-shared/meson.build <<'MESONEOF'
          project('spirv-cross', 'cpp', version: '0.59.0')
          cmake = import('cmake')
          opts = cmake.subproject_options()
          opts.add_cmake_defines({
              'SPIRV_CROSS_EXCEPTIONS_TO_ASSERTIONS': 'ON',
              'SPIRV_CROSS_CLI': 'OFF',
              'SPIRV_CROSS_ENABLE_TESTS': 'OFF',
              'SPIRV_CROSS_ENABLE_MSL': 'OFF',
              'SPIRV_CROSS_ENABLE_CPP': 'OFF',
              'SPIRV_CROSS_ENABLE_REFLECT': 'OFF',
              'SPIRV_CROSS_ENABLE_UTIL': 'OFF',
          })
          spirv_cross_proj = cmake.subproject('spirv-cross', options: opts)
          spirv_cross_c_dep = declare_dependency(dependencies: [
              spirv_cross_proj.dependency('spirv-cross-c'),
              spirv_cross_proj.dependency('spirv-cross-core'),
              spirv_cross_proj.dependency('spirv-cross-glsl'),
              spirv_cross_proj.dependency('spirv-cross-hlsl'),
          ])
          meson.override_dependency('spirv-cross-c-shared', spirv_cross_c_dep)
          MESONEOF

          # vulkan-loader: custom meson.build
          mkdir -p subprojects/vulkan
          cat > subprojects/vulkan/meson.build <<'MESONEOF'
          project('vulkan', 'cpp', version: '1.3.285')
          cmake = import('cmake')
          opts = cmake.subproject_options()
          opts.add_cmake_defines({
              'UPDATE_DEPS': 'ON',
              'USE_GAS': 'ON',
          })
          vulkan_proj = cmake.subproject('vulkan-loader', options: opts)
          vulkan_dep = vulkan_proj.dependency('vulkan')
          meson.override_dependency('vulkan', vulkan_dep)
          MESONEOF

          echo "=== Created files ==="
          ls -la subprojects/

      - name: Setup cross compilation
        run: |
          prefix=$PWD/deps
          mkdir -p "$prefix"
          fam=x86_64
          [[ "$TARGET" == "i686-"* ]] && fam=x86
          cat > "$prefix/crossfile" <<EOF
          [built-in options]
          buildtype = 'release'
          default_library = 'static'
          [binaries]
          c = ['$TARGET-gcc-posix']
          cpp = ['$TARGET-g++-posix']
          ar = '$TARGET-ar'
          nm = '$TARGET-nm'
          strip = '$TARGET-strip'
          pkgconfig = 'pkg-config'
          pkg-config = 'pkg-config'
          windres = '$TARGET-windres'
          nasm = 'nasm'
          cmake = '/usr/bin/cmake'
          [host_machine]
          system = 'windows'
          cpu_family = '${fam}'
          cpu = '${TARGET%%-*}'
          endian = 'little'
          EOF

      - name: Build mpv with static deps
        run: |
          prefix=$PWD/deps
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall"
          export LDFLAGS="-fstack-protector-strong"
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"

          build=build; rm -rf $build
          meson setup $build \
            --cross-file "$prefix/crossfile" \
            --wrap-mode=forcefallback \
            -Ddefault_library=static \
            -Dlibmpv=true \
            -Dcplayer=false \
            -Dgpl=true \
            -Dffmpeg:gpl=enabled \
            -Dffmpeg:sdl2=disabled \
            -Dffmpeg:vulkan=auto \
            -Dffmpeg:libdav1d=enabled \
            -Dffmpeg:libaom=disabled \
            -Dffmpeg:libjxl=disabled \
            -Dharfbuzz:freetype=enabled \
            -Dlcms2:fastfloat=true \
            -Dlcms2:jpeg=disabled \
            -Dlcms2:tiff=disabled \
            -Dlibass:test=enabled \
            -Dlibjpeg-turbo:tests=disabled \
            -Dlibusb:tests=false \
            -Dlibusb:examples=false \
            -Dlibplacebo:demos=false \
            -Dlibplacebo:lcms=enabled \
            -Dlibplacebo:shaderc=disabled \
            -Dlibplacebo:tests=false \
            -Dlibplacebo:vulkan=disabled \
            -Dlibplacebo:d3d11=disabled \
            -Dlibpsl:tests=false \
            -Dxxhash:inline-all=true \
            -Dxxhash:cli=false \
            -Dluajit:amalgam=true \
            -D{amf,javascript,libcurl}=enabled \
            -D{shaderc,spirv-cross,vulkan}=disabled \
            -D{drm,wayland,x11}=disabled

          meson compile -C $build

          echo "=== Build output ==="
          ls -lh $build/libmpv*.{a,dll,dll.a} 2>/dev/null || true
          ls -lh $build/mpv.exe 2>/dev/null || true

      - name: Create exports def
        run: |
          build=build
          echo "EXPORTS" > $build/mpv_exports.def
          $TARGET-nm $build/libmpv.a 2>/dev/null | grep " T " | awk '{print $3}' | grep "^mpv_" | sort -u >> $build/mpv_exports.def || true
          echo "=== Exports ==="
          cat $build/mpv_exports.def

      - name: Collect artifacts
        run: |
          build=build
          mkdir -p release/${{ matrix.arch }}
          cp $build/libmpv-2.dll release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.dll.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/mpv_exports.def release/${{ matrix.arch }}/ 2>/dev/null || true
          mkdir -p release/${{ matrix.arch }}/include/mpv
          cp include/mpv/*.h release/${{ matrix.arch }}/include/mpv/
          echo "=== Release ==="
          ls -lh release/${{ matrix.arch }}/

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-static-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
