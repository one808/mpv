name: Build static libmpv.dll

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
            rust_target: i686-pc-windows-gnu
            wine: wine32
          - arch: x86_64
            target: x86_64-w64-mingw32
            rust_target: x86_64-pc-windows-gnu
            wine: wine64

    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      TARGET: ${{ matrix.target }}
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-libmpv3-${{ matrix.arch }}
          restore-keys: ccache-libmpv3-${{ matrix.arch }}-

      - name: Install dependencies
        run: |
          rustup target add ${{ matrix.rust_target }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf ${{ matrix.wine }} wine
          python3 -m pip install meson

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      - name: Build ALL dependencies as static
        run: |
          # Force ALL build systems to produce static libraries
          sed -i 's/--disable-static --enable-shared/--enable-static --disable-shared/' ci/build-mingw64.sh
          sed -i "s/default_library = 'shared'/default_library = 'static'/" ci/build-mingw64.sh
          sed -i 's/-DBUILD_SHARED_LIBS=ON/-DBUILD_SHARED_LIBS=OFF/' ci/build-mingw64.sh
          ./ci/build-mingw64.sh || true
          echo "=== Static .a files: $(find "$PWD/mingw_prefix/lib" -name '*.a' | wc -l) ==="
          echo "=== .pc files: $(find "$PWD/mingw_prefix" -name '*.pc' | wc -l) ==="
          find "$PWD/mingw_prefix" -name 'libavcodec*.pc' 2>/dev/null || echo "no libavcodec.pc found"
          find "$PWD/mingw_prefix" -name 'libavcodec*' 2>/dev/null | head -5

      - name: Build mpv libmpv
        run: |
          prefix_dir=$PWD/mingw_prefix
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I$prefix_dir/include"
          export LDFLAGS="-fstack-protector-strong -L$prefix_dir/lib"
          export PKG_CONFIG_SYSROOT_DIR="$prefix_dir"
          export PKG_CONFIG_LIBDIR="$prefix_dir/lib/pkgconfig"
          build=build; rm -rf $build
          meson setup $build \
            --cross-file "$prefix_dir/crossfile" \
            --buildtype release \
            --force-fallback-for=mujs \
            -Dmujs:werror=false -Dmujs:default_library=static \
            -Dlua=luajit -Dlibmpv=true -Dprefer_static=true \
            -D{amf,shaderc,spirv-cross,d3d11,javascript,libcurl}=enabled
          meson compile -C $build
          echo "=== libmpv built ==="
          ls -lh $build/libmpv*.a 2>/dev/null || true

      - name: Create libmpv-2.dll
        run: |
          prefix_dir=$PWD/mingw_prefix; build=build
          ALL_LIBS=$(find "$prefix_dir/lib" "$build" "subprojects" \
            -name "*.a" ! -name "libdl.a" 2>/dev/null | sort -u)
          COUNT=$(echo "$ALL_LIBS" | wc -l)
          echo "=== Linking $COUNT static libraries ==="
          $TARGET-gcc-posix -shared -o $build/libmpv-2.dll \
            -Wl,--whole-archive $ALL_LIBS -Wl,--no-whole-archive \
            -Wl,--output-def,$build/libmpv-2.def \
            -Wl,--out-implib=$build/libmpv.dll.a \
            -Wl,--no-undefined \
            -Wl,--nxcompat,--no-seh,--dynamicbase \
            -lstdc++ -lgcc_s \
            -lws2_32 -lbcrypt -lcrypt32 -lncrypt -lsecur32 \
            -luser32 -lgdi32 -ladvapi32 -lshell32 -lole32 -loleaut32 \
            -lshcore -ldwmapi -limm32 -lntdll -lversion -lwinmm \
            -lpsapi -luuid -lcomdlg32 -lstrmiids -lmfuuid \
            -lopengl32 -luxtheme -lpathcch -liphlpapi || true
          echo "=== DLL ==="
          ls -lh $build/libmpv-2.dll
          echo "=== mpv exports ==="
          grep -c "mpv_" $build/libmpv-2.def || true
          grep "mpv_" $build/libmpv-2.def | head -20 || true

      - name: Create clean exports def
        run: |
          build=build
          echo "EXPORTS" > $build/mpv_exports.def
          grep "mpv_" $build/libmpv-2.def | sed 's/^ *//' >> $build/mpv_exports.def || true
          echo "=== Exports def ==="
          wc -l $build/mpv_exports.def
          head -20 $build/mpv_exports.def

      - name: Collect artifacts
        run: |
          build=build
          mkdir -p release/${{ matrix.arch }}
          cp $build/libmpv-2.dll release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.dll.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/mpv_exports.def release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv-2.def release/${{ matrix.arch }}/ 2>/dev/null || true
          mkdir -p release/${{ matrix.arch }}/include/mpv
          cp include/mpv/*.h release/${{ matrix.arch }}/include/mpv/
          echo "=== Release ==="
          ls -lh release/${{ matrix.arch }}/

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-libmpv3-${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-static-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
