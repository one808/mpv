name: Build static libmpv.dll

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64

    env:
      CC: "ccache clang"
      CXX: "ccache clang++"
      CC_LD: "lld-link"
      CXX_LD: "lld-link"
      RUST_LD: "lld-link"
      WINDRES: "llvm-rc"
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: "${{ github.workspace }}\\.ccache"
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Disable autocrlf
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          python -m pip install meson glad2
          winget install --accept-source-agreements --accept-package-agreements Ccache.Ccache NASM.NASM
          echo "$env:LOCALAPPDATA\Microsoft\WinGet\Links" >> $env:GITHUB_PATH
          rustup default nightly

      - name: Update Meson WrapDB
        run: |
          meson wrap update-db
          meson wrap install expat
          meson wrap install harfbuzz
          meson wrap install libpng
          meson wrap install zlib

      - name: Find Visual Studio
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Could not find a Visual Studio installation" }
          "VS=$vsPath" >> $env:GITHUB_ENV

      - name: Build
        id: build
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -ne 'C:\Program Files\LLVM\bin' -and `
                                                             $_ -ne 'C:\Program Files\CMake\bin' -and `
                                                             $_ -ne 'C:\Strawberry\c\bin' }) -join ';'
          $env:PATH += ';C:\Program Files\NASM'
          Import-Module "$env:VS\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $env:VS -SkipAutomaticLocation -DevCmdArguments "-arch=${{ matrix.arch }} -host_arch=${{ matrix.arch }}"

          # Setup subprojects from build-win32.ps1 (same as upstream)
          $subprojects = "subprojects"
          if (-not (Test-Path $subprojects)) { New-Item -Path $subprojects -ItemType Directory | Out-Null }

          # AMF headers
          $amfVersion = "1.5.0"
          $amfUrl = "https://github.com/GPUOpen-LibrariesAndSDKs/AMF/releases/download/v$amfVersion/AMF-headers-v$amfVersion.tar.gz"
          $amfArchive = "AMF-headers-v$amfVersion.tar.gz"
          $amfExtractPath = "$subprojects/amf-headers"
          if (-not (Test-Path $amfArchive)) { Invoke-WebRequest -Uri $amfUrl -OutFile $amfArchive }
          if (-not (Test-Path "$amfExtractPath/AMF")) {
            New-Item -Path $amfExtractPath -ItemType Directory -Force | Out-Null
            tar -xzf $amfArchive --strip-components=1 -C $amfExtractPath
          }
          $amfExtractPath = Resolve-Path $amfExtractPath

          # Patch build-win32.ps1 to build libmpv instead of mpv.exe
          (Get-Content ci/build-win32.ps1) `
            -replace '-Dlibmpv=false', '-Dlibmpv=true' `
            -replace 'ninja -C build mpv.exe mpv.com', 'ninja -C build libmpv-2.dll' |
            Set-Content ci/build-win32.ps1

          # Run the patched build script
          ./ci/build-win32.ps1

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-static-${{ matrix.arch }}
          path: |
            build/libmpv-2.dll
            build/libmpv*.lib
            build/libmpv*.a
