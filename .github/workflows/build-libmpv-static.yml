name: Build static libmpv.dll

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
            rust_target: i686-pc-windows-gnu
            wine: wine32
          - arch: x86_64
            target: x86_64-w64-mingw32
            rust_target: x86_64-pc-windows-gnu
            wine: wine64

    env:
      TARGET: ${{ matrix.target }}
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          rustup target add ${{ matrix.rust_target }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf ${{ matrix.wine }} wine \
            gettext autoconf automake libtool
          python3 -m pip install meson

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      - name: Setup build environment
        run: |
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          prefix=$PWD/deps
          mkdir -p $prefix/lib $prefix/include
          fam=x86_64
          [[ "$TARGET" == "i686-"* ]] && fam=x86
          cat > "$prefix/crossfile" <<EOF
          [built-in options]
          buildtype = 'release'
          default_library = 'static'
          [binaries]
          c = ['$TARGET-gcc-posix']
          cpp = ['$TARGET-g++-posix']
          ar = '$TARGET-ar'
          nm = '$TARGET-nm'
          strip = '$TARGET-strip'
          pkgconfig = 'pkg-config'
          pkg-config = 'pkg-config'
          windres = '$TARGET-windres'
          nasm = 'nasm'
          [host_machine]
          system = 'windows'
          cpu_family = '${fam}'
          cpu = '${TARGET%%-*}'
          endian = 'little'
          EOF
          # Create symlinks for DESTDIR installs
          ln -snf . "$prefix/usr"
          ln -snf . "$prefix/local"

      - name: Build ffmpeg (static)
        run: |
          prefix=$PWD/deps
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall"
          export LDFLAGS="-fstack-protector-strong"
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"
          if [ ! -d ffmpeg ]; then
            git clone --depth=1 https://github.com/FFmpeg/FFmpeg.git ffmpeg
          fi
          mkdir -p ffmpeg/build && cd ffmpeg/build
          ../configure \
            --target-os=mingw32 --enable-gpl \
            --enable-cross-compile --cross-prefix=$TARGET- --arch=${TARGET%%-*} \
            --cc="$TARGET-gcc-posix" --cxx="$TARGET-g++-posix" \
            --enable-static --disable-shared \
            --disable-{doc,programs} \
            --enable-muxer=spdif --enable-encoder=mjpeg,png \
            --prefix=/usr/local
          make -j$(nproc)
          make DESTDIR="$prefix" install
          echo "=== ffmpeg .a files ==="
          find $prefix -name 'libavcodec.a' 2>/dev/null
          find $prefix -name 'libavformat.a' 2>/dev/null
          echo "=== ffmpeg .pc files ==="
          find $prefix -name 'libavcodec.pc' 2>/dev/null

      - name: Build freetype + fribidi + harfbuzz + libass (static via meson)
        run: |
          prefix=$PWD/deps
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I$prefix/include"
          export LDFLAGS="-fstack-protector-strong -L$prefix/lib"
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"
          for dep in freetype fribidi harfbuzz libass; do
            if [ ! -d $dep ]; then
              case $dep in
                freetype) ver=2.14.3; tarball="https://download.savannah.gnu.org/releases/freetype/freetype-${ver}.tar.xz"; dir="freetype-${ver}" ;;
                fribidi) ver=1.0.16; tarball="https://github.com/fribidi/fribidi/releases/download/v${ver}/fribidi-${ver}.tar.xz"; dir="fribidi-${ver}" ;;
                harfbuzz) ver=10.2.0; tarball="https://github.com/harfbuzz/harfbuzz/releases/download/${ver}/harfbuzz-${ver}.tar.xz"; dir="harfbuzz-${ver}" ;;
                libass) tarball=""; dir="" ;;
              esac
              if [ -n "$tarball" ]; then
                wget -q "$tarball" -O /tmp/${dep}.tar.xz
                tar xf /tmp/${dep}.tar.xz
                mv $dir $dep 2>/dev/null || true
              else
                git clone --depth=1 https://github.com/libass/libass.git
              fi
            fi
            builddir=${dep}/builddir
            rm -rf $builddir; mkdir -p $builddir
            cd $builddir
            if [ -f ../../meson.build ]; then
              meson setup .. --cross-file "$prefix/crossfile" \
                -D{tests,docs}=false -Ddefault_library=static
              ninja
              DESTDIR="$prefix" ninja install
            else
              # libass uses autotools
              export CFLAGS="$CFLAGS -I$prefix/include"
              export LDFLAGS="$LDFLAGS -L$prefix/lib"
              cd ../
              ./autogen.sh 2>/dev/null || true
              ./configure --host=$TARGET --enable-static --disable-shared \
                --prefix=/usr/local PKG_CONFIG_PATH="$prefix/lib/pkgconfig"
              make -j$(nproc)
              make DESTDIR="$prefix" install
            fi
            cd "$OLDPWD"
          done
          echo "=== Static libs ==="
          find $prefix/lib -name '*.a' | grep -E "freetype|fribidi|harfbuzz|ass" | head -10

      - name: Build luajit (static)
        run: |
          prefix=$PWD/deps
          if [ ! -d luajit ]; then
            git clone --depth=1 https://github.com/LuaJIT/LuaJIT.git luajit
          fi
          cd luajit
          make -j$(nproc) HOST_CC=cc CROSS=$TARGET- \
            TARGET_CFLAGS="-O2 -pipe" \
            BUILDMODE=static
          make DESTDIR="$prefix" PREFIX=/usr/local install
          cd "$OLDPWD"
          find $prefix -name 'libluajit*' 2>/dev/null | head -5

      - name: Build mpv (static)
        run: |
          prefix=$PWD/deps
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I$prefix/include"
          export LDFLAGS="-fstack-protector-strong -L$prefix/lib"
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"
          build=build; rm -rf $build
          meson setup $build \
            --cross-file "$prefix/crossfile" \
            --buildtype release \
            --force-fallback-for=mujs \
            -Dmujs:werror=false -Dmujs:default_library=static \
            -Dlua=luajit -Dlibmpv=true -Dprefer_static=true \
            -D{amf,shaderc,spirv-cross,d3d11,javascript,libcurl}=enabled
          meson compile -C $build
          echo "=== Built ==="
          ls -lh $build/libmpv*.a $build/mpv.exe 2>/dev/null || true

      - name: Create single libmpv-2.dll
        run: |
          prefix=$PWD/deps; build=build
          ALL_LIBS=$(find "$prefix/lib" "$build" "subprojects" \
            -name "*.a" ! -name "libdl.a" 2>/dev/null | sort -u)
          COUNT=$(echo "$ALL_LIBS" | wc -l)
          echo "=== Linking $COUNT static libraries ==="
          echo "$ALL_LIBS" | head -20
          $TARGET-gcc-posix -shared -o $build/libmpv-2.dll \
            -Wl,--whole-archive $ALL_LIBS -Wl,--no-whole-archive \
            -Wl,--output-def,$build/libmpv-2.def \
            -Wl,--out-implib=$build/libmpv.dll.a \
            -Wl,--no-undefined \
            -Wl,--nxcompat,--no-seh,--dynamicbase \
            -lstdc++ -lgcc_s \
            -lws2_32 -lbcrypt -lcrypt32 -lncrypt -lsecur32 \
            -luser32 -lgdi32 -ladvapi32 -lshell32 -lole32 -loleaut32 \
            -lshcore -ldwmapi -limm32 -lntdll -lversion -lwinmm \
            -lpsapi -luuid -lcomdlg32 -lstrmiids -lmfuuid \
            -lopengl32 -luxtheme -lpathcch -liphlpapi || true
          echo "=== DLL ==="
          ls -lh $build/libmpv-2.dll
          echo "=== mpv exports ==="
          grep -c "mpv_" $build/libmpv-2.def || true
          grep "mpv_" $build/libmpv-2.def | head -10 || true
          echo "EXPORTS" > $build/mpv_exports.def
          grep "mpv_" $build/libmpv-2.def | sed 's/^ *//' >> $build/mpv_exports.def || true
          wc -l $build/mpv_exports.def

      - name: Collect artifacts
        run: |
          build=build
          mkdir -p release/${{ matrix.arch }}
          cp $build/libmpv-2.dll release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.dll.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/mpv_exports.def release/${{ matrix.arch }}/ 2>/dev/null || true
          mkdir -p release/${{ matrix.arch }}/include/mpv
          cp include/mpv/*.h release/${{ matrix.arch }}/include/mpv/
          echo "=== Release ==="
          ls -lh release/${{ matrix.arch }}/

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-static-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
