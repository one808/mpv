name: Build libmpv.dll

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
            rust_target: i686-pc-windows-gnu
            wine: wine32

    env:
      TARGET: ${{ matrix.target }}
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          rustup target add ${{ matrix.rust_target }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf ${{ matrix.wine }} wine
          python3 -m pip install meson

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      # Step 1: build-mingw64.sh builds all deps as shared (known working)
      - name: Build dependencies
        run: ./ci/build-mingw64.sh || true

      # Step 2: Rebuild autotools deps as STATIC from already-downloaded source
      - name: Rebuild ffmpeg as static
        run: |
          prefix=$PWD/mingw_prefix
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"
          cd ffmpeg
          rm -rf build-static; mkdir build-static; cd build-static
          ../configure \
            --target-os=mingw32 --enable-gpl \
            --enable-cross-compile --cross-prefix=$TARGET- --arch=${TARGET%%-*} \
            --cc="$TARGET-gcc-posix" --cxx="$TARGET-g++-posix" \
            --enable-static --disable-shared \
            --disable-{doc,programs} \
            --enable-muxer=spdif --enable-encoder=mjpeg,png \
            --enable-libdav1d \
            --prefix=/usr/local
          make -j$(nproc)
          make DESTDIR="$prefix" install
          cd "$OLDPWD"
          echo "=== ffmpeg static .a ==="
          find $prefix -name 'libavcodec.a' 2>/dev/null

      - name: Rebuild libass dependencies as static
        run: |
          prefix=$PWD/mingw_prefix
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I$prefix/include"
          export LDFLAGS="-fstack-protector-strong -L$prefix/lib"
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"

          # Rebuild meson-based deps as static (freetype, fribidi, harfbuzz)
          for dep in freetype fribidi harfbuzz; do
            srcdir=$(find . -maxdepth 2 -name "$dep-*" -type d | head -1)
            if [ -d "$srcdir" ]; then
              builddir="$srcdir/builddir-static"
              rm -rf "$builddir"; mkdir -p "$builddir"
              cd "$builddir"
              meson setup .. --cross-file "$prefix/crossfile" \
                -Ddefault_library=static
              ninja
              DESTDIR="$prefix" ninja install
              cd "$OLDPWD"
            fi
          done

          # Rebuild libass as static (autotools)
          if [ -d "libass" ]; then
            cd libass
            ./autogen.sh 2>/dev/null || true
            ./configure --host=$TARGET --enable-static --disable-shared \
              --prefix=/usr/local \
              PKG_CONFIG_PATH="$prefix/lib/pkgconfig" \
              CFLAGS="-I$prefix/include" LDFLAGS="-L$prefix/lib"
            make -j$(nproc)
            make DESTDIR="$prefix" install
            cd "$OLDPWD"
          fi

          echo "=== Static .a files ==="
          find $prefix/lib -name '*.a' | grep -v libdl | head -20

      # Step 3: Build mpv with static deps
      - name: Build mpv
        run: |
          prefix=$PWD/mingw_prefix
          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar NM=$TARGET-nm RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I$prefix/include"
          export LDFLAGS="-fstack-protector-strong -L$prefix/lib"
          export PKG_CONFIG_SYSROOT_DIR="$prefix"
          export PKG_CONFIG_LIBDIR="$prefix/lib/pkgconfig"
          build=build; rm -rf $build
          meson setup $build \
            --cross-file "$prefix/crossfile" \
            --buildtype release \
            --force-fallback-for=mujs \
            -Dmujs:werror=false -Dmujs:default_library=static \
            -Dlua=luajit -Dlibmpv=true -Dprefer_static=true \
            -D{amf,shaderc,spirv-cross,d3d11,javascript,libcurl}=enabled
          meson compile -C $build
          echo "=== Built ==="
          ls -lh $build/libmpv*.a $build/mpv.exe 2>/dev/null || true

      # Step 4: Create single self-contained DLL
      - name: Create libmpv-2.dll
        run: |
          prefix=$PWD/mingw_prefix; build=build
          ALL_LIBS=$(find "$prefix/lib" "$build" "subprojects" \
            -name "*.a" ! -name "libdl.a" 2>/dev/null | sort -u)
          COUNT=$(echo "$ALL_LIBS" | wc -l)
          echo "=== Linking $COUNT static libraries ==="
          $TARGET-gcc-posix -shared -o $build/libmpv-2.dll \
            -Wl,--whole-archive $ALL_LIBS -Wl,--no-whole-archive \
            -Wl,--output-def,$build/libmpv-2.def \
            -Wl,--out-implib=$build/libmpv.dll.a \
            -Wl,--no-undefined \
            -Wl,--nxcompat,--no-seh,--dynamicbase \
            -lstdc++ -lgcc_s \
            -lws2_32 -lbcrypt -lcrypt32 -lncrypt -lsecur32 \
            -luser32 -lgdi32 -ladvapi32 -lshell32 -lole32 -loleaut32 \
            -lshcore -ldwmapi -limm32 -lntdll -lversion -lwinmm \
            -lpsapi -luuid -lcomdlg32 -lstrmiids -lmfuuid \
            -lopengl32 -luxtheme -lpathcch -liphlpapi || true
          echo "=== DLL ==="
          ls -lh $build/libmpv-2.dll
          echo "=== mpv exports ==="
          grep -c "mpv_" $build/libmpv-2.def || true
          grep "mpv_" $build/libmpv-2.def | head -10 || true
          echo "EXPORTS" > $build/mpv_exports.def
          grep "mpv_" $build/libmpv-2.def | sed 's/^ *//' >> $build/mpv_exports.def || true
          wc -l $build/mpv_exports.def

      - name: Collect artifacts
        run: |
          build=build
          mkdir -p release/${{ matrix.arch }}
          cp $build/libmpv-2.dll release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.dll.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/libmpv.a release/${{ matrix.arch }}/ 2>/dev/null || true
          cp $build/mpv_exports.def release/${{ matrix.arch }}/ 2>/dev/null || true
          mkdir -p release/${{ matrix.arch }}/include/mpv
          cp include/mpv/*.h release/${{ matrix.arch }}/include/mpv/
          echo "=== Release ==="
          ls -lh release/${{ matrix.arch }}/

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-static-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
