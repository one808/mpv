name: Build mpv Shared

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
            rust_target: i686-pc-windows-gnu
            wine: wine32
          - arch: x86_64
            target: x86_64-w64-mingw32
            rust_target: x86_64-pc-windows-gnu
            wine: wine64

    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      TARGET: ${{ matrix.target }}
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: ccache-${{ matrix.arch }}-

      - name: Restore dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/mingw_prefix
          key: deps-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: deps-${{ matrix.arch }}-

      - name: Install dependencies
        run: |
          rustup target add ${{ matrix.rust_target }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf ${{ matrix.wine }} wine
          python3 -m pip install meson

      - name: Fix Wine 32-bit DLLs
        if: matrix.arch == 'i686'
        run: |
          echo "WINEPATH=/usr/i686-w64-mingw32/lib;/usr/lib/gcc/i686-w64-mingw32/13-posix" >> $GITHUB_ENV

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      # Step 1: Build ALL as static (dependencies + libmpv)
      - name: Build all static
        run: |
          prefix_dir=$PWD/mingw_prefix
          # Ensure crossfile uses static
          sed -i "s/default_library = 'shared'/default_library = 'static'/" "$prefix_dir/crossfile" 2>/dev/null || true
          # Create empty libdl.a for luajit
          $TARGET-ar rcs "$prefix_dir/lib/libdl.a" 2>/dev/null || true

          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar
          export NM=$TARGET-nm
          export RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I'$prefix_dir/include'"
          export LDFLAGS="-fstack-protector-strong -L'$prefix_dir/lib'"
          export PKG_CONFIG_SYSROOT_DIR="$prefix_dir"
          export PKG_CONFIG_LIBDIR="$prefix_dir/lib/pkgconfig"

          build=mingw_build
          rm -rf $build

          mpv_args=(
            --cross-file "$prefix_dir/crossfile"
            --buildtype release
            --force-fallback-for=mujs
            -Dmujs:werror=false
            -Dmujs:default_library=static
            -Dlua=luajit
            -Dlibmpv=true
            -Dprefer_static=true
            -D{amf,shaderc,spirv-cross,d3d11,javascript,libcurl}=enabled
          )
          meson setup $build "${mpv_args[@]}"
          meson compile -C $build

          echo "=== Build output ==="
          ls -lh $build/libmpv*.a $build/mpv.exe 2>/dev/null

      # Step 2: Create libmpv.dll from static libmpv.a using --whole-archive
      - name: Create libmpv.dll from static
        run: |
          prefix_dir=$PWD/mingw_prefix
          build=mingw_build

          echo "=== Creating libmpv-2.dll from static libmpv.a ==="

          # Collect all .a files except libdl.a and libmpv.a itself
          ALL_LIBS=$(find "$prefix_dir/lib" -name "*.a" \
            ! -name "libdl.a" ! -name "libmpv.a" \
            ! -name "libmpv.dll.a" 2>/dev/null)

          # Build linker flags from .a files
          LDFLAGS=""
          for lib in $ALL_LIBS; do
            LDFLAGS="$LDFLAGS -Wl,--whole-archive $lib -Wl,--no-whole-archive"
          done

          $TARGET-gcc-posix -shared -o $build/libmpv-2.dll \
            -Wl,--whole-archive $build/libmpv.a -Wl,--no-whole-archive \
            $LDFLAGS \
            -Wl,--out-implib=$build/libmpv.dll.a \
            -Wl,--no-undefined \
            -Wl,--nxcompat,--no-seh,--dynamicbase \
            -L"$prefix_dir/lib" \
            -lws2_32 -lbcrypt -lcrypt32 -lncrypt -lsecur32 \
            -luser32 -lgdi32 -ladvapi32 -lshell32 -lole32 -loleaut32 \
            -lshcore -ldwmapi -limm32 -lntdll -lversion -lwinmm \
            -lpsapi -luuid -lcomdlg32 -lstrmiids -lmfuuid \
            -lopengl32 -luxtheme -lpathcch -liphlpapi \
            -lstdc++ -lgcc_s \
            -Wl,--allow-shlib-undefined 2>&1 || true

          echo "=== Result ==="
          ls -lh $build/libmpv-2.dll $build/mpv.exe 2>/dev/null

      # Step 3: Collect artifacts
      - name: Collect artifacts
        run: |
          build=mingw_build
          mkdir -p release/${{ matrix.arch }}

          cp -v $build/mpv.exe release/${{ matrix.arch }}/ 2>/dev/null || true
          cp -v $build/libmpv-2.dll release/${{ matrix.arch }}/ 2>/dev/null || true
          cp -v $build/libmpv.dll.a release/${{ matrix.arch }}/ 2>/dev/null || true

          mkdir -p release/${{ matrix.arch }}/include/mpv
          cp -v include/mpv/*.h release/${{ matrix.arch }}/include/mpv/

          echo "=== Final release contents ==="
          ls -lh release/${{ matrix.arch }}/

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}

      - name: Wait for cache
        if: always()
        run: sleep 5

      - name: Save dependencies cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ github.workspace }}/mingw_prefix
          key: deps-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-shared-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
