name: Build mpv Shared

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
            rust_target: i686-pc-windows-gnu
            wine: wine32
          - arch: x86_64
            target: x86_64-w64-mingw32
            rust_target: x86_64-pc-windows-gnu
            wine: wine64

    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      TARGET: ${{ matrix.target }}
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: ccache-${{ matrix.arch }}-

      - name: Restore dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/mingw_prefix
          key: deps-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: deps-${{ matrix.arch }}-

      - name: Install dependencies
        run: |
          rustup target add ${{ matrix.rust_target }}
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache g++-mingw-w64 gcc-multilib python3-pip \
            nasm ninja-build pkgconf ${{ matrix.wine }} wine
          python3 -m pip install meson

      - name: Fix Wine 32-bit DLLs
        if: matrix.arch == 'i686'
        run: |
          echo "WINEPATH=/usr/i686-w64-mingw32/lib;/usr/lib/gcc/i686-w64-mingw32/13-posix" >> $GITHUB_ENV

      - name: Install Meson Wraps
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      # Step 1: Build dependencies as static libraries
      - name: Build dependencies (static)
        run: |
          # Temporarily set crossfile to static for dependency build
          prefix_dir=$PWD/mingw_prefix
          if [ -f "$prefix_dir/crossfile" ]; then
            sed -i "s/default_library = 'shared'/default_library = 'static'/" "$prefix_dir/crossfile"
          fi
          ./ci/build-mingw64.sh
          # Create empty libdl.a for luajit
          $TARGET-ar rcs "$prefix_dir/lib/libdl.a" 2>/dev/null || true

      # Step 2: Restore crossfile to shared, build mpv with libmpv
      - name: Build mpv with libmpv (shared DLL, static deps)
        run: |
          prefix_dir=$PWD/mingw_prefix
          # Restore crossfile to shared for libmpv.dll build
          sed -i "s/default_library = 'static'/default_library = 'shared'/" "$prefix_dir/crossfile"

          export CC=$TARGET-gcc-posix
          export CXX=$TARGET-g++-posix
          export AR=$TARGET-ar
          export NM=$TARGET-nm
          export RANLIB=$TARGET-ranlib
          export CFLAGS="-O2 -pipe -Wall -I'$prefix_dir/include'"
          export LDFLAGS="-fstack-protector-strong -L'$prefix_dir/lib'"
          export PKG_CONFIG_SYSROOT_DIR="$prefix_dir"
          export PKG_CONFIG_LIBDIR="$prefix_dir/lib/pkgconfig"

          build=mingw_build
          rm -rf $build

          # Dependencies are already static .a files in prefix_dir/lib/
          # libmpv will be built as shared DLL, linking against those static deps
          mpv_args=(
            --cross-file "$prefix_dir/crossfile"
            --buildtype release
            --force-fallback-for=mujs
            -Dmujs:werror=false
            -Dmujs:default_library=static
            -Dlua=luajit
            -Dlibmpv=true
            -Dprefer_static=true
            -D{amf,shaderc,spirv-cross,d3d11,javascript,libcurl}=enabled
          )
          meson setup $build "${mpv_args[@]}"
          meson compile -C $build

      # Step 3: Collect only mpv.exe + libmpv-2.dll + headers
      - name: Collect artifacts
        run: |
          build=mingw_build
          mkdir -p release/${{ matrix.arch }}

          # mpv.exe (links to libmpv-2.dll)
          cp -v $build/mpv.exe release/${{ matrix.arch }}/ 2>/dev/null || true

          # libmpv-2.dll (all deps statically linked inside)
          cp -v $build/libmpv-2.dll release/${{ matrix.arch }}/ 2>/dev/null || true

          # Import library
          cp -v $build/libmpv.dll.a release/${{ matrix.arch }}/ 2>/dev/null || true

          # Headers
          mkdir -p release/${{ matrix.arch }}/include/mpv
          cp -v include/mpv/*.h release/${{ matrix.arch }}/include/mpv/

          # Show what we got
          echo "=== Release contents ==="
          ls -lh release/${{ matrix.arch }}/

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}

      - name: Wait for cache
        if: always()
        run: sleep 5

      - name: Save dependencies cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ github.workspace }}/mingw_prefix
          key: deps-${{ matrix.arch }}-${{ hashFiles('ci/build-mingw64.sh') }}

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-shared-${{ matrix.arch }}
          path: release/${{ matrix.arch }}/
